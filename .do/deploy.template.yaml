spec:
  name: codemax-openclaw
  region: sgp
  workers:
    - name: codemax-openclaw
      dockerfile_path: /Dockerfile
      source_dir: /
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-2gb # Minimum 2GB required - 1GB causes heap overflow
      git:
        branch: main
        repo_clone_url: https://github.com/bennycodemax/codemax-openclaw.git
      envs:
        # Required
        - key: OPENCLAW_GATEWAY_TOKEN
          scope: RUN_TIME
          type: SECRET
        - key: STABLE_HOSTNAME
          scope: RUN_TIME
          value: codemax-openclaw
        - key: ANTHROPIC_API_KEY
          scope: RUN_TIME
          type: SECRET

        # Feature flags
        - key: ENABLE_NGROK
          scope: RUN_TIME
          value: "true"
        - key: TAILSCALE_ENABLE
          scope: RUN_TIME
          value: "false"
        - key: ENABLE_SPACES
          scope: RUN_TIME
          value: "true"
        - key: ENABLE_UI
          scope: RUN_TIME
          value: "true"

        # ngrok config
        - key: NGROK_AUTHTOKEN
          scope: RUN_TIME
          type: SECRET

        # Tailscale config
        - key: TS_AUTHKEY
          scope: RUN_TIME
          type: SECRET

        # Spaces config
        - key: AWS_ACCESS_KEY_ID
          scope: RUN_TIME
          type: SECRET
        - key: AWS_SECRET_ACCESS_KEY
          scope: RUN_TIME
          type: SECRET
        - key: RESTIC_SPACES_ENDPOINT
          scope: RUN_TIME
          value: sgp1.digitaloceanspaces.com
        - key: RESTIC_SPACES_BUCKET
          scope: RUN_TIME
          value: codemax-openclaw-space
        - key: RESTIC_HOST
          scope: RUN_TIME
          value: openclaw
        - key: RESTIC_PASSWORD
          scope: RUN_TIME
          type: SECRET

        # OpenClaw Agents
        - key: OPENCLAW_AGENTS
          scope: RUN_TIME
